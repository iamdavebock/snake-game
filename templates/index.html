<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake</title>
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
    <h1>Snake</h1>
    <div id="score-display">Score: <span id="score">0</span></div>

    <div id="game-wrapper">
        <canvas id="board" width="400" height="400"></canvas>

        <div id="dead">
            <h2>GAME OVER</h2>
            <div class="final-score">Score: <span id="final-score">0</span></div>
            <p>Press R to restart</p>
        </div>
    </div>

    <!-- Mobile controls -->
    <div id="mobile-controls">
        <div class="ctrl-row">
            <button class="ctrl-btn" data-dir="UP">&#9650;</button>
        </div>
        <div class="ctrl-row">
            <button class="ctrl-btn" data-dir="LEFT">&#9664;</button>
            <button class="ctrl-btn" data-dir="DOWN">&#9660;</button>
            <button class="ctrl-btn" data-dir="RIGHT">&#9654;</button>
        </div>
    </div>

    <div id="footer">
        <a href="https://davebock.au" target="_blank">visit davebock.au</a>
        <span class="divider">|</span>
        <span class="built">Built on Ember</span>
    </div>

    <script>
        const GRID = 20;
        const CELL = 400 / GRID; // 20px per cell
        const TICK_MS = 120;

        const canvas = document.getElementById("board");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");
        const finalScoreEl = document.getElementById("final-score");
        const deadEl = document.getElementById("dead");

        // ---- Game state ----

        let snake, dir, nextDir, dirQueue, food, score, alive, intervalId;

        const OPPOSITE = { UP: "DOWN", DOWN: "UP", LEFT: "RIGHT", RIGHT: "LEFT" };
        const DELTA = {
            UP:    [0, -1],
            DOWN:  [0,  1],
            LEFT:  [-1, 0],
            RIGHT: [1,  0],
        };

        function randomFood(snake) {
            const occupied = new Set(snake.map(([x, y]) => `${x},${y}`));
            let x, y;
            do {
                x = Math.floor(Math.random() * GRID);
                y = Math.floor(Math.random() * GRID);
            } while (occupied.has(`${x},${y}`));
            return [x, y];
        }

        function initGame() {
            const startX = 10, startY = 10;
            snake = [[startX, startY], [startX - 1, startY], [startX - 2, startY]];
            dir = "RIGHT";
            nextDir = "RIGHT";
            dirQueue = [];
            food = randomFood(snake);
            score = 0;
            alive = true;
            scoreEl.textContent = "0";
            deadEl.classList.remove("visible");
        }

        function applyNextDir() {
            if (dirQueue.length > 0) {
                const candidate = dirQueue.shift();
                // Ignore 180-degree reversals
                if (candidate !== OPPOSITE[dir]) {
                    dir = candidate;
                }
            }
        }

        function tick() {
            if (!alive) return;

            applyNextDir();

            const [dx, dy] = DELTA[dir];
            const head = snake[0];
            const newHead = [head[0] + dx, head[1] + dy];

            // Wall collision
            if (newHead[0] < 0 || newHead[0] >= GRID || newHead[1] < 0 || newHead[1] >= GRID) {
                alive = false;
                render();
                return;
            }

            // Self collision (exclude tail — it moves away this tick)
            for (let i = 0; i < snake.length - 1; i++) {
                if (snake[i][0] === newHead[0] && snake[i][1] === newHead[1]) {
                    alive = false;
                    render();
                    return;
                }
            }

            snake.unshift(newHead);

            // Food check
            if (newHead[0] === food[0] && newHead[1] === food[1]) {
                score += 10;
                scoreEl.textContent = score;
                food = randomFood(snake);
            } else {
                snake.pop();
            }

            render();
        }

        // ---- Drawing ----

        function drawGrid() {
            ctx.strokeStyle = "rgba(255,255,255,0.04)";
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= GRID; i++) {
                const pos = i * CELL;
                ctx.beginPath();
                ctx.moveTo(pos, 0);
                ctx.lineTo(pos, 400);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, pos);
                ctx.lineTo(400, pos);
                ctx.stroke();
            }
        }

        function render() {
            // Background
            ctx.fillStyle = "#0d0d1a";
            ctx.fillRect(0, 0, 400, 400);

            drawGrid();

            // Snake
            snake.forEach(([x, y], i) => {
                const px = x * CELL;
                const py = y * CELL;
                ctx.fillStyle = i === 0 ? "#00ffaa" : "#00cc66";
                ctx.fillRect(px + 1, py + 1, CELL - 2, CELL - 2);

                // Head highlight
                if (i === 0) {
                    ctx.fillStyle = "rgba(255,255,255,0.18)";
                    ctx.fillRect(px + 2, py + 2, CELL * 0.35, CELL * 0.35);
                }
            });

            // Food
            const [fx, fy] = food;
            const cx = fx * CELL + CELL / 2;
            const cy = fy * CELL + CELL / 2;
            const r = CELL / 2 - 2;

            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.fillStyle = "#ff4444";
            ctx.fill();

            // Shine dot
            ctx.beginPath();
            ctx.arc(cx - r * 0.25, cy - r * 0.25, r * 0.3, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(255,255,255,0.35)";
            ctx.fill();

            // Game over overlay
            if (!alive) {
                finalScoreEl.textContent = score;
                deadEl.classList.add("visible");
            }
        }

        // ---- Input ----

        function queueDir(newDir) {
            // Only buffer one pending direction change
            const last = dirQueue.length > 0 ? dirQueue[dirQueue.length - 1] : dir;
            if (newDir !== last && newDir !== OPPOSITE[last]) {
                if (dirQueue.length < 1) {
                    dirQueue.push(newDir);
                }
            }
        }

        document.addEventListener("keydown", (e) => {
            const map = {
                ArrowUp: "UP", ArrowDown: "DOWN",
                ArrowLeft: "LEFT", ArrowRight: "RIGHT",
            };
            if (map[e.key]) {
                e.preventDefault();
                queueDir(map[e.key]);
                return;
            }
            if (e.key === "r" || e.key === "R") {
                restart();
            }
        });

        // Mobile buttons
        document.querySelectorAll(".ctrl-btn").forEach((btn) => {
            btn.addEventListener("click", () => {
                const d = btn.dataset.dir;
                if (d) queueDir(d);
            });
        });

        function restart() {
            clearInterval(intervalId);
            initGame();
            render();
            intervalId = setInterval(tick, TICK_MS);
        }

        // ---- Start ----
        initGame();
        render();
        intervalId = setInterval(tick, TICK_MS);
    </script>
</body>
</html>
